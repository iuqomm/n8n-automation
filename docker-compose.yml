version: '3.8'

services:
  # PostgreSQL: necesario para que los workflows programados (scheduled) sean confiables
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-summary-notes
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - TZ=America/Santiago
      # Base de datos
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_secret_change_me}
      # Fuerza permisos correctos en el archivo de configuración
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # Habilita task runners (requerido en versiones futuras)
      - N8N_RUNNERS_ENABLED=true
      # IMPORTANTE: permite leer $env.* en workflows (necesario para SPREADSHEET_ID)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Deshabilita bare repos en Git node (seguridad)
      - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
      # Host y URL pública (cambiar a IP del servidor en red local)
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      # Variables de negocio accesibles desde los workflows con $env.*
      - SPREADSHEET_ID=${SPREADSHEET_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    # Tunnel desactivado: las ejecuciones programadas no necesitan webhooks externos.
    # Para habilitar webhooks de Jira u otros servicios externos, cambiar a: "start --tunnel"
    command: "start"

volumes:
  n8n_data:
  postgres_data:
